<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Portfolio</title>
    <link rel="stylesheet" href="cardstyle.css">
</head>
<body class="login-page">
    <main class="login-main">
        <div class="login-panel">
            <div class="brand">
                <span class="brand-mark">U</span>
                <div>
                    <p class="eyebrow">University Student</p>
                    <h1>Sign in</h1>
                </div>
            </div>
            <p class="login-intro">Enter your email and password to access the portfolio tools and analytics.</p>

            <form id="loginForm">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" placeholder="student@example.com" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Password" required>

                <button type="submit" class="btn btn-primary">Sign in</button>
                <p class="form-status" id="loginStatus" aria-live="polite"></p>
            </form>

            <p class="hint">Demo account: <strong>muktarusman329@gmail.com</strong> / <strong>student123</strong></p>
            <a href="card.html" class="btn btn-secondary">Back to portfolio</a>
        </div>
    </main>

    <script src="login.js"></script>
</body>
</html>
